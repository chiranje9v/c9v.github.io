<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C9V Software Solutions</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 40px;
    background: rgba(0,0,0,0.3);
}

.logo {
    height: 40px;
}

.nav-links a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
}

/* HERO */
.container {
    text-align: center;
    padding: 80px 20px;
}

h1 {
    font-size: 48px;
}

p {
    font-size: 18px;
    max-width: 700px;
    margin: auto;
}

/* BUTTON */
.btn {
    margin-top: 30px;
    padding: 12px 25px;
    border-radius: 25px;
    background: #00d4ff;
    border: none;
    cursor: pointer;
}

/* CARDS */
.section {
    margin-top: 70px;
    text-align: center;
}

.cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: rgba(255,255,255,0.1);
    margin: 15px;
    padding: 20px;
    border-radius: 10px;
    width: 260px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* CONTACT */
.contact {
    margin-top: 20px;
}

/* WHATSAPP BUTTON */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 12px 15px;
    border-radius: 50%;
    text-decoration: none;
    font-size: 20px;
}

/* FOOTER */
footer {
    text-align: center;
    margin-top: 60px;
    padding: 20px;
}
</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">
    <img src="logo.png.jpeg" class="logo">
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </div>
</div>

<!-- HERO -->

<div class="container">
    <h1>C9V Software Solutions</h1>
    <p>We build modern, scalable software solutions for businesses.</p>
    <button class="btn">Get Started</button>
</div>

<!-- SERVICES -->

<div class="section">
    <h2>Our Services</h2>
    <div class="cards">
        <div class="card">💻 Web Development</div>
        <div class="card">📊 Management Systems</div>
        <div class="card">🔐 Secure Solutions</div>
    </div>
</div>

<!-- PROJECT -->

<div class="section">
    <h2>Our Work</h2>
    <div class="card" style="margin:auto;">
        Viraj Incident Management System
    </div>
</div>

<!-- CONTACT -->

<div class="section">
    <h2>Contact Us</h2>
    <div class="contact">
        📧 chiranjeevt823@gmail.com
    </div>
</div>

<!-- WHATSAPP -->

<a href="https://wa.me/91XXXXXXXXXX" class="whatsapp">💬</a>

<footer>
© 2026 C9V Software Solutions
</footer>

</body>
</html>
